steps:
  - name: gcr.io/cloud-builders/docker
    args: [buildx, create, --use, --name, builder, --driver, docker-container]

  - name: gcr.io/cloud-builders/docker
    args:
      - buildx
      - build
      - --cache-from
      - type=registry,ref=us-central1-docker.pkg.dev/project-ce74a06d-c017-4712-8f0/jogga/cache
      - --cache-to
      - type=registry,ref=us-central1-docker.pkg.dev/project-ce74a06d-c017-4712-8f0/jogga/cache,mode=max
      - --push
      - -t
      - us-central1-docker.pkg.dev/project-ce74a06d-c017-4712-8f0/jogga/jogga:latest
      - .

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
