services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - fedisport
      - jogga
    restart: unless-stopped

  # testing.jogga.fit — multi-user fedisport instance
  fedisport:
    image: us-central1-docker.pkg.dev/project-ce74a06d-c017-4712-8f0/fedisport/fedisport:latest
    env_file: .env.testing
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # single.jogga.fit — single-user jogga (core) instance
  jogga:
    image: us-central1-docker.pkg.dev/project-ce74a06d-c017-4712-8f0/jogga/jogga:latest
    env_file: .env.single
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: fedisport
      POSTGRES_PASSWORD: fedisport
      POSTGRES_DB: fedisport
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/10-jogga.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedisport"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
